name: Release MCPB

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@8ade135a41bc03ea155e62e844d188df1ea18608 # v4.1.0

      - uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8 # v4.0.2
        with:
          node-version: 22
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install mcpb dependencies
        run: cd mcpb && npm ci

      - name: Build MCPB bundle
        run: npm run build:mcpb

      - name: Attach MCPB artifact to release
        uses: softprops/action-gh-release@c9f2b65c2d95d1f31a10f6a0f0b7f7727e7e1459 # v2.2.1
        with:
          files: dist-mcpb/snake.mcpb
